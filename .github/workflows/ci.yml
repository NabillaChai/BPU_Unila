name: PHP CI

on:
  push:
    branches:
      - '**'        
  pull_request:
    branches:
      - '**'        

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Build Project
        run: |
          echo "Build running on branch:"
          git branch --show-current
          php -v
          ls -la

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP Syntax Check
        run: |
          echo "Testing PHP files..."
          find . -name "*.php" -print0 | xargs -0 -n1 php -l
